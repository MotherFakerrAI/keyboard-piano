<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>键盘钢琴 🎹 | MotherFaker Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-cyan: #00ffff;
      --neon-pink: #ff00ff;
      --neon-purple: #bf00ff;
      --neon-blue: #0080ff;
    }

    body {
      background: #050508;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 背景网格 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* 扫描线效果 */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    /* 团队 Logo */
    .studio-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
      font-family: 'Share Tech Mono', monospace;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      animation: spin 10s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo-text {
      font-size: 0.9rem;
      color: var(--neon-cyan);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: 4px;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.5)); }
    }

    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* 录音控制栏 */
    .record-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .record-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 12px 28px;
      border: 2px solid;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .record-btn.record {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
    }

    .record-btn.record:hover {
      background: var(--neon-pink);
      color: #000;
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
    }

    .record-btn.record.recording {
      background: var(--neon-pink);
      color: #000;
      animation: recordingPulse 0.5s infinite;
    }

    @keyframes recordingPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }
      50% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.8); }
    }

    .record-btn.stop {
      border-color: #ffa502;
      color: #ffa502;
      box-shadow: 0 0 10px rgba(255, 165, 2, 0.2);
    }

    .record-btn.stop:hover {
      background: #ffa502;
      color: #000;
      box-shadow: 0 0 25px rgba(255, 165, 2, 0.5);
    }

    .record-btn.play {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    }

    .record-btn.play:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
    }

    .record-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: none;
    }

    .record-btn:disabled:hover {
      background: transparent;
      color: inherit;
    }

    /* 录音状态 */
    .record-status {
      height: 24px;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--neon-pink);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .record-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-pink);
      display: none;
      box-shadow: 0 0 10px var(--neon-pink);
    }

    .record-status .dot.show {
      display: block;
      animation: dotBlink 0.8s infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 琴键容器 */
    .piano {
      display: flex;
      justify-content: center;
      position: relative;
      padding: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 255, 0.1);
    }

    .keys {
      display: flex;
      gap: 6px;
    }

    .key {
      width: 55px;
      height: 90px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
      border-radius: 0 0 6px 6px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--neon-cyan);
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 
        0 4px 15px rgba(0, 0, 0, 0.5),
        inset 0 -2px 10px rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .key::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 30%;
      background: linear-gradient(180deg, rgba(0, 255, 255, 0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .key:hover {
      transform: translateY(-3px);
      border-color: var(--neon-cyan);
      box-shadow: 
        0 8px 25px rgba(0, 0, 0, 0.5),
        0 0 20px rgba(0, 255, 255, 0.3);
    }

    .key:hover::before {
      opacity: 1;
    }

    .key:active, .key.active {
      transform: translateY(4px);
      background: linear-gradient(180deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
      color: #000;
      box-shadow: 
        0 0 30px rgba(0, 255, 255, 0.6),
        0 0 60px rgba(0, 255, 255, 0.3);
      border-color: var(--neon-cyan);
    }

    .hint {
      margin-top: 2rem;
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 2px;
    }

    .hint kbd {
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
      padding: 4px 10px;
      border-radius: 4px;
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 255, 255, 0.3);
      margin: 0 2px;
    }

    /* 底部链接 */
    .footer {
      position: fixed;
      bottom: 20px;
      color: #333;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .footer a {
      color: var(--neon-purple);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="container">
    <!-- 团队 Logo -->
    <div class="studio-logo">
      <svg class="logo-icon" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M45 5L80 25V65L45 85L10 65V25L45 5Z" stroke="#00a8ff" stroke-width="2" fill="none"/>
        <path d="M45 20L65 32V58L45 70L25 58V32L45 20Z" stroke="#00ffff" stroke-width="2" fill="none"/>
        <circle cx="45" cy="45" r="12" stroke="#ff00ff" stroke-width="2" fill="none"/>
      </svg>
      <span class="logo-text">MotherFaker Studio</span>
    </div>
    
    <h1>🎹 KEYBOARD</h1>
    <p class="subtitle">Press keys to play</p>
    
    <!-- 录音控制栏 -->
    <div class="record-controls">
      <button class="record-btn record" id="recordBtn" onclick="toggleRecord()">● REC</button>
      <button class="record-btn stop" id="stopBtn" onclick="stopRecord()" disabled>■ STOP</button>
      <button class="record-btn play" id="playBtn" onclick="playRecord()" disabled>▶ PLAY</button>
    </div>
    
    <div class="record-status" id="recordStatus">
      <span class="dot" id="recordDot"></span>
      <span id="statusText"></span>
    </div>
    
    <div class="piano">
      <div class="keys" id="keys"></div>
    </div>
    
    <p class="hint">USE KEYBOARD <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> <kbd>F</kbd> <kbd>G</kbd> <kbd>H</kbd> <kbd>J</kbd> <kbd>K</kbd> <kbd>L</kbd></p>
  </div>

  <div class="footer">
    <a href="https://github.com/MotherFakerrAI" target="_blank">MotherFaker Studio</a>
  </div>

  <script>
    // 音频上下文
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    // 音符频率
    const notes = {
      'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
      'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
      'C5': 523.25, 'D5': 587.33, 'E5': 659.25
    };

    // 键盘映射
    const keyMap = {
      'a': 'C4', 's': 'D4', 'd': 'E4', 'f': 'F4',
      'g': 'G4', 'h': 'A4', 'j': 'B4', 'k': 'C5', 'l': 'D5'
    };

    // 琴键配置
    const keyConfig = [
      { note: 'C4', key: 'a', label: 'A' },
      { note: 'D4', key: 's', label: 'S' },
      { note: 'E4', key: 'd', label: 'D' },
      { note: 'F4', key: 'f', label: 'F' },
      { note: 'G4', key: 'g', label: 'G' },
      { note: 'A4', key: 'h', label: 'H' },
      { note: 'B4', key: 'j', label: 'J' },
      { note: 'C5', key: 'k', label: 'K' },
      { note: 'D5', key: 'l', label: 'L' }
    ];

    // 录音相关
    let isRecording = false;
    let recordedNotes = [];
    let recordStartTime = 0;

    // DOM 元素
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const playBtn = document.getElementById('playBtn');
    const recordDot = document.getElementById('recordDot');
    const statusText = document.getElementById('statusText');

    // 粒子系统 - 修复：使用全局变量确保动画持续运行
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 粒子类
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 8;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.decay = 0.012 + Math.random() * 0.008;
        this.color = color;
        this.size = 2 + Math.random() * 4;
        this.glow = 0;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.97;
        this.vy *= 0.97;
        this.life -= this.decay;
        this.glow = Math.min(1, this.glow + 0.1);
      }

      draw() {
        // 发光效果
        if (this.glow > 0) {
          const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size * 3
          );
          gradient.addColorStop(0, this.color.replace('1)', `${this.life * 0.5})`));
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
          ctx.fill();
        }
        
        // 核心粒子
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${this.life})`);
        ctx.fill();
      }
    }

    // 粒子爆炸
    function createParticleExplosion(x, y, note) {
      const colors = [
        'rgba(0, 255, 255, 1)',
        'rgba(255, 0, 255, 1)',
        'rgba(191, 0, 255, 1)',
        'rgba(0, 128, 255, 1)',
        'rgba(255, 255, 0, 1)'
      ];

      const colorIndex = Object.keys(notes).indexOf(note) % colors.length;
      const color = colors[colorIndex];

      // 添加新粒子
      for (let i = 0; i < 40; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    // 绘制连线
    function drawConnections() {
      ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
      ctx.lineWidth = 1;
      
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0, 255, 255, ${(1 - dist / 100) * 0.2})`;
            ctx.stroke();
          }
        }
      }
    }

    // 动画循环 - 修复：始终保持运行
    function animate() {
      animationId = requestAnimationFrame(animate);
      
      // 半透明背景产生拖尾效果
      ctx.fillStyle = 'rgba(5, 5, 8, 0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 更新和绘制粒子
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      // 绘制连线
      drawConnections();
    }

    // 启动动画循环 - 修复：在页面加载时立即启动
    animate();

    // 获取按键位置
    function getKeyPosition(note) {
      const keyEl = document.querySelector(`.key[data-note="${note}"]`);
      if (keyEl) {
        const rect = keyEl.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2
        };
      }
      return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    }

    // 创建琴键
    const keysContainer = document.getElementById('keys');
    keyConfig.forEach(({ note, key, label }) => {
      const keyEl = document.createElement('div');
      keyEl.className = 'key';
      keyEl.dataset.note = note;
      keyEl.dataset.key = key;
      keyEl.textContent = label;
      keysContainer.appendChild(keyEl);
    });

    // 播放音符
    function playNote(note, isPlayback = false) {
      const freq = notes[note];
      if (!freq) return;

      // 录音模式
      if (isRecording) {
        const timestamp = Date.now() - recordStartTime;
        recordedNotes.push({ note, timestamp });
      }

      // 音频
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.8);

      // UI 激活
      const keyEntry = Object.entries(keyMap).find(([k, v]) => v === note);
      if (keyEntry) {
        const keyEl = document.querySelector(`.key[data-key="${keyEntry[0]}"]`);
        if (keyEl) {
          keyEl.classList.add('active');
          setTimeout(() => keyEl.classList.remove('active'), 150);
        }
      }

      // 粒子效果
      const pos = getKeyPosition(note);
      createParticleExplosion(pos.x, pos.y, note);
    }

    // 录音控制
    function toggleRecord() {
      if (!isRecording) {
        isRecording = true;
        recordedNotes = [];
        recordStartTime = Date.now();
        
        recordBtn.textContent = '● REC...';
        recordBtn.classList.add('recording');
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        playBtn.disabled = true;
        recordDot.classList.add('show');
        statusText.textContent = 'Recording...';
      }
    }

    function stopRecord() {
      if (isRecording) {
        isRecording = false;
        
        recordBtn.textContent = '● REC';
        recordBtn.classList.remove('recording');
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        playBtn.disabled = recordedNotes.length === 0;
        recordDot.classList.remove('show');
        
        if (recordedNotes.length > 0) {
          statusText.textContent = `Recorded ${recordedNotes.length} notes`;
        } else {
          statusText.textContent = '';
        }
      }
    }

    function playRecord() {
      if (recordedNotes.length === 0) return;
      
      statusText.textContent = 'Playing...';
      playBtn.disabled = true;
      
      let index = 0;
      
      function playNext() {
        if (index >= recordedNotes.length) {
          statusText.textContent = `Played ${recordedNotes.length} notes`;
          playBtn.disabled = false;
          return;
        }
        
        const item = recordedNotes[index];
        playNote(item.note, true);
        
        index++;
        
        if (index < recordedNotes.length) {
          const nextTimestamp = recordedNotes[index].timestamp;
          const delay = nextTimestamp - item.timestamp;
          setTimeout(playNext, Math.max(delay, 50));
        } else {
          setTimeout(() => {
            statusText.textContent = `Played ${recordedNotes.length} notes`;
            playBtn.disabled = false;
          }, 500);
        }
      }
      
      playNext();
    }

    // 键盘事件
    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const key = e.key.toLowerCase();
      if (keyMap[key]) {
        playNote(keyMap[key]);
      }
    });

    // 鼠标点击事件
    keysContainer.addEventListener('click', (e) => {
      if (e.target.classList.contains('key')) {
        const note = e.target.dataset.note;
        playNote(note);
      }
    });

    // 恢复 AudioContext
    document.addEventListener('click', () => {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }, { once: true });
  </script>
</body>
</html>
