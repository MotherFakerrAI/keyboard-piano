<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>键盘钢琴 🎹</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(128, 200, 255, 0.5);
    }

    .subtitle {
      color: #888;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    /* 录音控制栏 */
    .record-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .record-btn {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 24px;
      border: 2px solid;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
    }

    .record-btn.record {
      border-color: #ff4757;
      color: #ff4757;
    }

    .record-btn.record:hover {
      background: #ff4757;
      color: #fff;
    }

    .record-btn.record.recording {
      background: #ff4757;
      color: #fff;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .record-btn.stop {
      border-color: #ffa502;
      color: #ffa502;
    }

    .record-btn.stop:hover {
      background: #ffa502;
      color: #fff;
    }

    .record-btn.play {
      border-color: #2ed573;
      color: #2ed573;
    }

    .record-btn.play:hover {
      background: #2ed573;
      color: #fff;
    }

    .record-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .record-btn:disabled:hover {
      background: transparent;
      color: inherit;
    }

    /* 录音状态 */
    .record-status {
      height: 24px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #ff4757;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .record-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4757;
      display: none;
    }

    .record-status .dot.show {
      display: block;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .keys {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
    }

    .key {
      width: 60px;
      height: 100px;
      background: linear-gradient(180deg, #fff 0%, #e0e0e0 100%);
      border-radius: 0 0 8px 8px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      font-size: 0.8rem;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    .key:hover {
      transform: translateY(-2px);
    }

    .key:active, .key.active {
      transform: translateY(4px);
      background: linear-gradient(180deg, #80c8ff 0%, #409cff 100%);
      box-shadow: 0 0 25px rgba(64, 156, 255, 0.6);
    }

    .key.black {
      width: 40px;
      height: 60px;
      background: linear-gradient(180deg, #333 0%, #000 100%);
      color: #fff;
      position: relative;
      z-index: 2;
    }

    .key.black:active, .key.black.active {
      background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
    }

    .hint {
      margin-top: 2rem;
      color: #555;
      font-size: 0.85rem;
    }

    .hint kbd {
      background: #222;
      padding: 2px 8px;
      border-radius: 4px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="container">
    <h1>🎹 键盘钢琴</h1>
    <p class="subtitle">按下键盘或点击琴键弹奏</p>
    
    <!-- 录音控制栏 -->
    <div class="record-controls">
      <button class="record-btn record" id="recordBtn" onclick="toggleRecord()">● 录音</button>
      <button class="record-btn stop" id="stopBtn" onclick="stopRecord()" disabled>■ 停止</button>
      <button class="record-btn play" id="playBtn" onclick="playRecord()" disabled>▶ 回放</button>
    </div>
    
    <div class="record-status" id="recordStatus">
      <span class="dot" id="recordDot"></span>
      <span id="statusText"></span>
    </div>
    
    <div class="keys" id="keys"></div>
    
    <p class="hint">使用键盘 <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> <kbd>F</kbd> <kbd>G</kbd> <kbd>H</kbd> <kbd>J</kbd> <kbd>K</kbd> <kbd>L</kbd> 弹奏</p>
  </div>

  <script>
    // 音频上下文
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    // 音符频率 (C4 to E5)
    const notes = {
      'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
      'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
      'C5': 523.25, 'D5': 587.33, 'E5': 659.25
    };

    // 键盘映射
    const keyMap = {
      'a': 'C4', 's': 'D4', 'd': 'E4', 'f': 'F4',
      'g': 'G4', 'h': 'A4', 'j': 'B4', 'k': 'C5', 'l': 'D5'
    };

    // 琴键配置
    const keyConfig = [
      { note: 'C4', key: 'a', label: 'A' },
      { note: 'D4', key: 's', label: 'S' },
      { note: 'E4', key: 'd', label: 'D' },
      { note: 'F4', key: 'f', label: 'F' },
      { note: 'G4', key: 'g', label: 'G' },
      { note: 'A4', key: 'h', label: 'H' },
      { note: 'B4', key: 'j', label: 'J' },
      { note: 'C5', key: 'k', label: 'K' },
      { note: 'D5', key: 'l', label: 'L' }
    ];

    // 录音相关变量
    let isRecording = false;
    let recordedNotes = [];
    let recordStartTime = 0;

    // DOM 元素
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const playBtn = document.getElementById('playBtn');
    const recordDot = document.getElementById('recordDot');
    const statusText = document.getElementById('statusText');

    // 创建琴键
    const keysContainer = document.getElementById('keys');
    keyConfig.forEach(({ note, key, label }) => {
      const keyEl = document.createElement('div');
      keyEl.className = 'key';
      keyEl.dataset.note = note;
      keyEl.dataset.key = key;
      keyEl.textContent = label;
      keysContainer.appendChild(keyEl);
    });

    // 播放音符
    function playNote(note, isPlayback = false) {
      const freq = notes[note];
      if (!freq) return;

      // 录音模式：记录音符和时间
      if (isRecording) {
        const timestamp = Date.now() - recordStartTime;
        recordedNotes.push({ note, timestamp });
      }

      // 创建振荡器
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

      // 音量包络
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.8);

      // 激活 UI
      const keyEntry = Object.entries(keyMap).find(([k, v]) => v === note);
      if (keyEntry) {
        const keyEl = document.querySelector(`.key[data-key="${keyEntry[0]}"]`);
        if (keyEl) {
          keyEl.classList.add('active');
          setTimeout(() => keyEl.classList.remove('active'), 150);
        }
      }

      // 触发粒子效果
      createParticleExplosion(note);
    }

    // 切换录音状态
    function toggleRecord() {
      if (!isRecording) {
        // 开始录音
        isRecording = true;
        recordedNotes = [];
        recordStartTime = Date.now();
        
        recordBtn.textContent = '● 录音中';
        recordBtn.classList.add('recording');
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        playBtn.disabled = true;
        recordDot.classList.add('show');
        statusText.textContent = '正在录音...';
      }
    }

    // 停止录音
    function stopRecord() {
      if (isRecording) {
        isRecording = false;
        
        recordBtn.textContent = '● 录音';
        recordBtn.classList.remove('recording');
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        playBtn.disabled = recordedNotes.length === 0;
        recordDot.classList.remove('show');
        
        if (recordedNotes.length > 0) {
          statusText.textContent = `已录制 ${recordedNotes.length} 个音符`;
        } else {
          statusText.textContent = '';
        }
      }
    }

    // 回放录音
    function playRecord() {
      if (recordedNotes.length === 0) return;
      
      statusText.textContent = '正在回放...';
      playBtn.disabled = true;
      
      // 按时间顺序回放
      let index = 0;
      
      function playNext() {
        if (index >= recordedNotes.length) {
          statusText.textContent = `回放完成 (${recordedNotes.length} 个音符)`;
          playBtn.disabled = false;
          return;
        }
        
        const item = recordedNotes[index];
        
        // 播放音符
        playNote(item.note, true);
        
        index++;
        
        // 计算下一个音符的延迟
        if (index < recordedNotes.length) {
          const nextTimestamp = recordedNotes[index].timestamp;
          const delay = nextTimestamp - item.timestamp;
          setTimeout(playNext, Math.max(delay, 50)); // 最小50ms间隔
        } else {
          setTimeout(() => {
            statusText.textContent = `回放完成 (${recordedNotes.length} 个音符)`;
            playBtn.disabled = false;
          }, 500);
        }
      }
      
      playNext();
    }

    // 粒子系统
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 粒子类
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 15;
        this.vy = (Math.random() - 0.5) * 15;
        this.life = 1;
        this.decay = 0.015 + Math.random() * 0.01;
        this.color = color;
        this.size = 3 + Math.random() * 4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.life -= this.decay;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace('1)', `${this.life})`);
        ctx.fill();
      }
    }

    // 粒子爆炸
    function createParticleExplosion(note) {
      const colors = [
        'rgba(64, 156, 255, 1)',
        'rgba(255, 107, 107, 1)',
        'rgba(255, 215, 0, 1)',
        'rgba(138, 43, 226, 1)',
        'rgba(0, 255, 127, 1)'
      ];

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      const colorIndex = Object.keys(notes).indexOf(note) % colors.length;
      const color = colors[colorIndex];

      for (let i = 0; i < 30; i++) {
        particles.push(new Particle(centerX, centerY, color));
      }
    }

    // 绘制连线
    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255, 255, 255, ${(1 - dist / 120) * 0.15})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    // 动画循环
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      drawConnections();

      requestAnimationFrame(animate);
    }
    animate();

    // 键盘事件
    document.addEventListener('keydown', (e) => {
      if (e.repeat) return; // 防止按住键重复触发
      const key = e.key.toLowerCase();
      if (keyMap[key]) {
        playNote(keyMap[key]);
      }
    });

    // 鼠标点击事件
    keysContainer.addEventListener('click', (e) => {
      if (e.target.classList.contains('key')) {
        const note = e.target.dataset.note;
        playNote(note);
      }
    });

    // 恢复 AudioContext
    document.addEventListener('click', () => {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }, { once: true });
  </script>
</body>
</html>
